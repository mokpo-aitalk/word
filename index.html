<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>아이컨택-QUIZ</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#2563eb;--green:#059669;--pink:#e11d6a;
  --yellow:#d97706;--purple:#7c3aed;
  --text:#1a1748;--muted:#6b7280;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%;overflow:hidden;
  font-family:'Noto Sans KR',sans-serif;
  background:linear-gradient(145deg,#c7d2fe 0%,#e0e7ff 30%,#fce7f3 70%,#ddd6fe 100%);
  display:flex;align-items:center;justify-content:center;
}

/* ══ 카드: 좌우 10px, 상하 12px 여백 ══ */
#card{
  width:calc(100% - 20px);   /* 좌우 여백 10px씩 → 가로 살짝 늘림 */
  max-width:460px;
  /* 높이는 JS로 결정 — 여기서는 overflow만 숨김 */
  background:rgba(255,255,255,0.97);
  border-radius:22px;
  box-shadow:0 8px 32px rgba(99,102,241,0.18),0 0 0 1px rgba(255,255,255,0.9);
  display:flex;flex-direction:column;
  overflow:hidden;
  padding:10px 10px 8px;
}

/* ── TOPBAR ── */
.topbar{
  flex-shrink:0;
  display:grid;grid-template-columns:auto 1fr auto;
  align-items:center;gap:6px;
  margin-bottom:5px;
}
.logo-img{height:20px;display:block;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.08));}
.topbar-center{display:flex;flex-direction:column;align-items:center;}
.topbar-title{
  font-family:'Black Han Sans',sans-serif;font-size:17px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.topbar-sub{font-size:7px;color:var(--muted);}
.topbar-btns{display:flex;gap:4px;}
.top-btn{
  padding:5px 10px;border-radius:8px;border:none;
  font-family:'Black Han Sans',sans-serif;font-size:11px;
  cursor:pointer;color:#fff;white-space:nowrap;
}
.top-btn.start  {background:linear-gradient(135deg,#2563eb,#7c3aed);box-shadow:0 2px 6px rgba(37,99,235,0.35);display:none;}
.top-btn.restart{background:linear-gradient(135deg,#059669,#0891b2);box-shadow:0 2px 6px rgba(5,150,105,0.3);}
.top-btn:active{transform:scale(0.93);}

.divider{
  flex-shrink:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(99,102,241,0.14),transparent);
  margin-bottom:5px;
}

/* ── CAT TABS ── */
.cat-tabs{
  flex-shrink:0;
  display:flex;gap:5px;
  margin-bottom:5px;
}
.cat-tab{
  flex:1;padding:7px 4px;border-radius:10px;border:none;
  font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .18s;
  line-height:1.3;letter-spacing:-.2px;
}
.cat-tab.tb{
  background:linear-gradient(160deg,#bfdbfe,#93c5fd);
  color:#1d4ed8;box-shadow:0 2px 0 #3b82f6;
  opacity:0.55;
}
.cat-tab.tg{
  background:linear-gradient(160deg,#a7f3d0,#6ee7b7);
  color:#065f46;box-shadow:0 2px 0 #10b981;
  opacity:0.55;
}
.cat-tab.tp{
  background:linear-gradient(160deg,#fbcfe8,#f9a8d4);
  color:#9d174d;box-shadow:0 2px 0 #ec4899;
  opacity:0.55;
}
.cat-tab.tb.cur{
  background:linear-gradient(160deg,#eff6ff,#dbeafe);
  color:#1d4ed8;
  box-shadow:0 4px 0 #2563eb,0 2px 8px rgba(37,99,235,0.3);
  opacity:1;transform:translateY(-2px);
}
.cat-tab.tg.cur{
  background:linear-gradient(160deg,#f0fdf4,#dcfce7);
  color:#065f46;
  box-shadow:0 4px 0 #059669,0 2px 8px rgba(5,150,105,0.3);
  opacity:1;transform:translateY(-2px);
}
.cat-tab.tp.cur{
  background:linear-gradient(160deg,#fdf2f8,#fce7f3);
  color:#9d174d;
  box-shadow:0 4px 0 #e11d6a,0 2px 8px rgba(225,29,106,0.3);
  opacity:1;transform:translateY(-2px);
}
.cat-tab:active{transform:translateY(1px) !important;}
.cat-tab.disabled{opacity:.25 !important;pointer-events:none;}

/* ── STATS ── */
.stats-row{flex-shrink:0;display:flex;gap:4px;margin-bottom:5px;}
.stat-box{
  flex:1;background:linear-gradient(135deg,#f8faff,#eef2ff);
  border:1px solid rgba(99,102,241,0.12);border-radius:9px;
  padding:3px 5px;text-align:center;
}
.stat-label{font-size:7px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;}
.stat-value{font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--yellow);
  line-height:1.15;-webkit-font-smoothing:antialiased;}
.stat-value.timer{color:var(--green);}
.stat-value.timer.warning{color:var(--pink)!important;animation:timerPulse .5s infinite;}

/* ── WORD BADGES ── */
.words-panel{flex-shrink:0;margin-bottom:5px;}
.words-label{font-size:8px;color:var(--muted);letter-spacing:1px;font-weight:700;margin-bottom:3px;}
.word-badges{display:flex;flex-wrap:wrap;gap:3px;}
.word-badge{
  padding:3px 8px;border-radius:12px;font-size:11px;font-weight:700;border:1.5px solid;
  -webkit-font-smoothing:antialiased;cursor:default;
}
.word-badge.pending{background:#eef2ff;border-color:rgba(99,102,241,0.28);color:#312e81;}
.word-badge.found{background:#dcfce7;border-color:#059669;color:#065f46;text-decoration:line-through;opacity:.7;}
.word-badge.clickable{cursor:pointer;}

/* ── GRID WRAP: 크기를 JS가 직접 지정 ── */
.grid-wrap{
  flex-shrink:0;           /* flex:1 안씀 — JS가 높이 지정 */
  background:linear-gradient(145deg,#eef2ff,#f0ebff);
  border:1.5px solid rgba(99,102,241,0.15);border-radius:14px;
  padding:5px;
  box-shadow:inset 0 2px 8px rgba(99,102,241,0.07);
  user-select:none;-webkit-user-select:none;
  overflow:hidden;
  margin-bottom:5px;
}
.grid{
  display:grid;
  gap:3px;
  /* columns/rows/크기: JS에서 지정 */
}

/* ── CELL ── */
.cell{
  display:flex;align-items:center;justify-content:center;
  font-family:'Noto Sans KR',sans-serif;font-weight:700;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  background:linear-gradient(160deg,#ffffff 0%,#f0f4ff 100%);
  border-radius:6px;
  border-top:2px solid rgba(255,255,255,0.95);
  border-left:2px solid rgba(255,255,255,0.75);
  border-right:2px solid rgba(180,185,230,0.3);
  border-bottom:2px solid rgba(180,185,230,0.4);
  box-shadow:2px 3px 5px rgba(99,102,241,0.12);
  cursor:pointer;transition:transform .08s;
  color:#1a1748;
}
.cell.selecting{
  background:linear-gradient(160deg,#bfdbfe,#a5b4fc);
  border-color:var(--blue);
  box-shadow:0 0 0 1.5px var(--blue),2px 3px 6px rgba(37,99,235,0.2);
  color:#1e3a8a;transform:scale(1.05);
}
.cell.found-anim{animation:cellFound .32s ease forwards;}
.cell.found-ok{
  background:linear-gradient(160deg,#bbf7d0,#6ee7b7)!important;
  border-color:#059669!important;
  box-shadow:0 0 0 1.5px #059669,2px 3px 5px rgba(5,150,105,0.18)!important;
  color:#064e3b!important;
}
.cell.ans-missed{
  background:linear-gradient(160deg,#fecdd3,#fda4af)!important;
  border-color:#e11d6a!important;
  box-shadow:0 0 0 1.5px #e11d6a,2px 3px 5px rgba(225,29,106,0.18)!important;
  color:#881337!important;
  animation:missBlink 1.1s ease-in-out infinite;
}
.cell.ans-hi{
  background:linear-gradient(160deg,#fef08a,#fde047)!important;
  border-color:#ca8a04!important;
  box-shadow:0 0 0 2px #ca8a04,2px 3px 7px rgba(202,138,4,0.25)!important;
  color:#713f12!important;transform:scale(1.07)!important;animation:none!important;
}

/* ── INFO BOX ── */
.info-box{
  flex-shrink:0;
  background:linear-gradient(135deg,#f0f4ff,#faf5ff);
  border-radius:9px;padding:4px 10px;
  border-left:3px solid var(--blue);
}
.info-title{font-size:10px;font-weight:700;color:var(--yellow);-webkit-font-smoothing:antialiased;}
.info-content{font-size:9px;color:var(--muted);line-height:1.4;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;-webkit-font-smoothing:antialiased;}

/* ── 기타 ── */
#fwCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:400;display:none;}
#fwCanvas.on{display:block;}
#cdOverlay{position:fixed;inset:0;display:none;justify-content:center;align-items:center;z-index:300;pointer-events:none;}
#cdOverlay.on{display:flex;}
.cd-num{
  font-family:'Black Han Sans',sans-serif;font-size:88px;
  background:linear-gradient(135deg,var(--pink),var(--yellow));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:countPulse .95s ease-in-out;
}
.pcont{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.particle{position:absolute;border-radius:50%;animation:particleFly .85s ease-out forwards;}

@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
@keyframes cellFound{0%{transform:scale(1.16);box-shadow:0 0 14px rgba(5,150,105,0.5)}100%{transform:scale(1)}}
@keyframes missBlink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes countPulse{0%{opacity:0;transform:scale(2.1)}30%{opacity:1;transform:scale(1)}80%{opacity:1}100%{opacity:0;transform:scale(0.85)}}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0)}100%{opacity:0;transform:translate(var(--tx),var(--ty))}}
</style>
</head>
<body>
<canvas id="fwCanvas"></canvas>
<div class="pcont" id="particles"></div>
<div id="cdOverlay"><div class="cd-num" id="cdNum"></div></div>

<div id="card">
  <div class="topbar">
    <img class="logo-img" id="mainLogo" src="" alt="목포고용복지+센터">
    <div class="topbar-center">
      <div class="topbar-title">아이컨택-QUIZ</div>
      <div class="topbar-sub">취업 단어 탐험 · 가로·세로·대각선</div>
    </div>
    <div class="topbar-btns">
      <button class="top-btn start"   id="btnStart"   onclick="onStartBtn()">▶ 시작</button>
      <button class="top-btn restart" id="btnRestart" onclick="onRestartBtn()">🔄 다시</button>
    </div>
  </div>
  <div class="divider"></div>
  <div class="cat-tabs">
    <button class="cat-tab tb cur" id="gtab-직업기초" onclick="onTabClick('직업기초')">💼 직업 기초</button>
    <button class="cat-tab tg"     id="gtab-취업지원" onclick="onTabClick('취업지원')">🎯 취업 지원</button>
    <button class="cat-tab tp"     id="gtab-노동정책" onclick="onTabClick('노동정책')">⚖️ 노동 정책</button>
  </div>
  <div class="stats-row">
    <div class="stat-box"><div class="stat-label">점수</div><div class="stat-value" id="scoreDisp">0</div></div>
    <div class="stat-box"><div class="stat-label">단어</div><div class="stat-value" id="wordDisp">0/8</div></div>
    <div class="stat-box"><div class="stat-label">시간</div><div class="stat-value timer" id="timeDisp">0:30</div></div>
  </div>
  <div class="words-panel">
    <div class="words-label">▸ 찾을 단어</div>
    <div class="word-badges" id="wordBadges"></div>
  </div>
  <div class="grid-wrap" id="gridWrap">
    <div class="grid" id="grid"></div>
  </div>
  <div class="info-box" id="infoBox">
    <div class="info-title">💡 시작 버튼을 눌러주세요!</div>
    <div class="info-content">가로·세로·대각선으로 단어를 드래그해서 찾아보세요.</div>
  </div>
</div>

const COLS=8, ROWS=9, PICK=8, GAP=3, PAD=5;

/* ════════════════════════════════
   레이아웃 핵심:
   1. 화면 전체 높이에서 상하 여백(24px) 뺀 값 = 카드 높이
   2. 카드 높이에서 고정 UI 높이 합계 뺀 값 = 격자에 쓸 수 있는 높이
   3. 격자에 쓸 수 있는 너비 = 카드 너비 - 패딩
   4. 셀 크기 = min(가용높이/ROWS, 가용너비/COLS) 로 정사각형
   5. 격자 실제 높이 = 셀크기×ROWS + GAP×(ROWS-1)
   6. grid-wrap 높이 = 격자 실제 높이 + PAD×2
   7. 카드 높이 = 고정 UI 합 + grid-wrap 높이
════════════════════════════════ */
function layout(){
  const MARGIN_V = 24;   // 상하 여백 합계 (각 12px)
  const MARGIN_H = 20;   // 좌우 여백 합계 (각 10px)

  // visualViewport: 키보드·주소창 변화까지 정확하게 반영
  const vp = window.visualViewport;
  const screenH = vp ? vp.height : window.innerHeight;
  const screenW = vp ? vp.width  : window.innerWidth;
  const cardW   = Math.min(screenW - MARGIN_H, 460);

  // 고정 UI 요소들 실측 높이 합산
  const card   = document.getElementById('card');
  const wrap   = document.getElementById('gridWrap');
  const info   = document.getElementById('infoBox');

  // 잠시 wrap 높이를 0으로 해서 나머지 요소 높이 측정
  wrap.style.height = '0px';
  card.style.height = 'auto';
  const fixedH = card.scrollHeight; // grid-wrap 제외 높이
  // info-box는 grid-wrap 아래에 있으므로 포함됨

  // 가용 높이: 전체 화면 - 상하여백 - 고정UI
  const availH = screenH - MARGIN_V - fixedH;
  // 가용 너비: 카드너비 - 좌우패딩 - wrap패딩
  const availW = cardW - 20 - PAD * 2;  // card padding 10*2

  // 셀 크기: 가로/세로 중 작은 값 → 정사각형
  const cellByH = Math.floor((availH - GAP*(ROWS-1) - PAD*2) / ROWS);
  const cellByW = Math.floor((availW - GAP*(COLS-1)) / COLS);
  const cell    = Math.max(Math.min(cellByH, cellByW), 28); // 최소 28px

  const gridW   = cell*COLS + GAP*(COLS-1);
  const gridH   = cell*ROWS + GAP*(ROWS-1);
  const wrapH   = gridH + PAD*2;
  const cardH   = fixedH + wrapH;

  // 폰트: 셀의 50%, 최소 11px 최대 19px
  const fs = Math.min(Math.max(Math.floor(cell * 0.50), 11), 19) + 'px';

  // 적용
  card.style.width  = cardW + 'px';
  card.style.height = Math.min(cardH, screenH - MARGIN_V) + 'px';

  wrap.style.width  = (gridW + PAD*2) + 'px';
  wrap.style.height = wrapH + 'px';

  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `repeat(${COLS},${cell}px)`;
  grid.style.gridTemplateRows    = `repeat(${ROWS},${cell}px)`;
  grid.style.width  = gridW + 'px';
  grid.style.height = gridH + 'px';

  document.querySelectorAll('.cell').forEach(c=>{
    c.style.width    = cell + 'px';
    c.style.height   = cell + 'px';
    c.style.fontSize = fs;
  });
}

function pickWords(cat){
  const cd=POOL[cat];
  const fixed=[...(cd.fixed||[])];
  const rem=PICK-fixed.length;
  const pool=cd.pool.filter(x=>!fixed.some(f=>f.w===x.w));
  for(let i=pool.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const picked=[...fixed,...pool.slice(0,rem)];
  for(let i=picked.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[picked[i],picked[j]]=[picked[j],picked[i]];}
  return{words:picked.map(x=>x.w),info:Object.fromEntries(picked.map(x=>[x.w,x.i]))};
}

function buildGrid(words){
  const grid=Array.from({length:ROWS},()=>Array(COLS).fill(''));
  const placed={};
  const dirs=[[0,1],[1,0],[1,1],[0,-1],[-1,0],[-1,-1],[1,-1],[-1,1]];
  const sorted=[...words].sort((a,b)=>[...b].length-[...a].length);
  for(const word of sorted){
    const ch=[...word];let ok=false,tries=0;
    while(!ok&&tries<600){
      const [dr,dc]=dirs[~~(Math.random()*dirs.length)];
      const r=~~(Math.random()*ROWS),c=~~(Math.random()*COLS);
      const cells=[];let fits=true;
      for(let i=0;i<ch.length;i++){
        const nr=r+dr*i,nc=c+dc*i;
        if(nr<0||nr>=ROWS||nc<0||nc>=COLS){fits=false;break;}
        if(grid[nr][nc]!==''&&grid[nr][nc]!==ch[i]){fits=false;break;}
        cells.push([nr,nc]);
      }
      if(fits){ch.forEach((c2,i)=>grid[cells[i][0]][cells[i][1]]=c2);placed[word]=cells;ok=true;}
      tries++;
    }
  }
  const KO='가나다라마바사아자차카타파하이에의고노도보소오요주구무두부수우투';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
    if(!grid[r][c]) grid[r][c]=KO[~~(Math.random()*KO.length)];
  return{grid,placed};
}

function renderGrid(){

    const d=document.createElement('div');
    d.className='cell';d.textContent=g.grid[r][c];
    d.dataset.r=r;d.dataset.c=c;
    d.addEventListener('mousedown',onDown);

    d.addEventListener('touchmove',onTM,{passive:false});

  document.addEventListener('mouseup',onUp);

function onTabClick(cat){if(g.phase!=='ready')return;g.cat=cat;updateTabs(false);prepareReady();}

function prepareReady(){
  clearInterval(timerInterval);
  const{words,info}=pickWords(g.cat);
  const{grid,placed}=buildGrid(words);
  g={phase:'ready',cat:g.cat,words,info,grid,placed,
     found:new Set(),score:0,timeLeft:POOL[g.cat].tl,baseTime:POOL[g.cat].tl,
     sel:false,start:null,cur:[]};
  updateTopBtns();updateTabs(false);renderBadges();renderGrid();updateStats();
  setInfo('💡 시작 버튼을 눌러주세요!',`${PICK}개 단어가 격자 안에 숨어 있어요!`);

function startGame(cat){
  clearInterval(timerInterval);
  const{words,info}=pickWords(cat);
  const{grid,placed}=buildGrid(words);
  g={phase:'playing',cat,words,info,grid,placed,
     found:new Set(),score:0,timeLeft:POOL[cat].tl,baseTime:POOL[cat].tl,
     sel:false,start:null,cur:[]};
  updateTopBtns();updateTabs(true);renderBadges();renderGrid();updateStats();
  setInfo('🎮 게임 시작!','단어를 드래그해서 찾아보세요!');
  timerInterval=setInterval(tick,1000);

function tick(){
  if(g.phase!=='playing')return;
  g.timeLeft--;updateStats();
  if(g.timeLeft<=5&&g.timeLeft>0){
    document.getElementById('cdNum').textContent=g.timeLeft;
    const ov=document.getElementById('cdOverlay');
    ov.classList.add('on');setTimeout(()=>ov.classList.remove('on'),900);
  }
  if(g.timeLeft<=0)endGame(false);
}

function endGame(complete){
  clearInterval(timerInterval);
  g.phase='answer';updateTopBtns();updateTabs(true);
  g.words.filter(w=>!g.found.has(w)).forEach(w=>{
    (g.placed[w]||[]).forEach(([r,c])=>{const el=gc(r,c);if(el)el.className='cell ans-missed';});
  });
  renderBadges(true);
  const found=g.found.size,total=g.words.length,pct=found/total;
  const emoji=complete?'🏆':pct>=.83?'🎯':pct>=.5?'💪':'😅';
  setInfo(`${emoji} ${complete?'완료!':'시간종료'} ${g.score}점 (${found}/${total}개)`,
          `못 찾은 단어 뱃지를 클릭하면 격자에서 위치를 강조해줘요.`);
  if(complete)launchFireworks(pct===1&&g.timeLeft>0);
}

let hlT=null;
function hlWord(word){
  if(g.phase!=='answer')return;
  clearTimeout(hlT);
  document.querySelectorAll('.cell.ans-hi').forEach(el=>{el.classList.remove('ans-hi');el.classList.add('ans-missed');});
  (g.placed[word]||[]).forEach(([r,c])=>{const el=gc(r,c);if(el){el.classList.remove('ans-missed');el.classList.add('ans-hi');}});
  setInfo(`📍 "${word}" 위치`,g.info[word]||'');
  hlT=setTimeout(()=>{(g.placed[word]||[]).forEach(([r,c])=>{const el=gc(r,c);if(el){el.classList.remove('ans-hi');el.classList.add('ans-missed');}});},2500);
}

function lineOf(r1,c1,r2,c2){
  const dr=r2-r1,dc=c2-c1,len=Math.max(Math.abs(dr),Math.abs(dc));
  if(len===0)return[[r1,c1]];
  const sr=dr===0?0:dr/Math.abs(dr),sc=dc===0?0:dc/Math.abs(dc);
  if(Math.abs(dr)&&Math.abs(dc)&&Math.abs(dr)!==Math.abs(dc))return[];
  const res=[];for(let i=0;i<=len;i++)res.push([r1+sr*i,c1+sc*i]);return res;
}
function isFC(r,c){for(const w of g.found)if((g.placed[w]||[]).some(([a,b])=>a===r&&b===c))return true;return false;}
function clearSel(){(g.cur||[]).forEach(([r,c])=>{const el=gc(r,c);if(el&&!isFC(r,c))el.classList.remove('selecting');});g.cur=[];}
function hlLine(s,e){const cells=lineOf(s[0],s[1],e[0],e[1]);g.cur=cells;cells.forEach(([r,c])=>{const el=gc(r,c);if(el&&!isFC(r,c))el.classList.add('selecting');});}
function onDown(e){if(g.phase!=='playing')return;e.preventDefault();g.sel=true;g.start=[+e.currentTarget.dataset.r,+e.currentTarget.dataset.c];clearSel();hlLine(g.start,g.start);}
function onOver(e){if(!g.sel||g.phase!=='playing')return;clearSel();hlLine(g.start,[+e.currentTarget.dataset.r,+e.currentTarget.dataset.c]);}
function onUp(){if(!g.sel||g.phase!=='playing')return;g.sel=false;checkSel();}
function onTS(e){if(g.phase!=='playing')return;e.preventDefault();const t=e.touches[0];const el=document.elementFromPoint(t.clientX,t.clientY);if(el?.classList.contains('cell')){g.sel=true;g.start=[+el.dataset.r,+el.dataset.c];clearSel();hlLine(g.start,g.start);}}
function onTM(e){if(!g.sel||g.phase!=='playing')return;e.preventDefault();const t=e.touches[0];const el=document.elementFromPoint(t.clientX,t.clientY);if(el?.classList.contains('cell')){clearSel();hlLine(g.start,[+el.dataset.r,+el.dataset.c]);}}
function onTE(){if(!g.sel||g.phase!=='playing')return;g.sel=false;checkSel();}
function checkSel(){
  const sel=(g.cur||[]).map(([r,c])=>g.grid[r][c]).join('');
  const rev=[...sel].reverse().join('');
  for(const word of g.words){
    if(g.found.has(word))continue;
    if(sel===word||rev===word){markFound(word);clearSel();return;}
  }
  (g.cur||[]).forEach(([r,c])=>{const el=gc(r,c);if(el)el.classList.remove('selecting');});g.cur=[];
}
function markFound(word){
  g.found.add(word);
  const bonus=~~(g.timeLeft/g.baseTime*50),pts=100+bonus;g.score+=pts;
  (g.placed[word]||[]).forEach(([r,c])=>{
    const el=gc(r,c);
    if(el){el.classList.remove('selecting');el.classList.add('found-anim');
      setTimeout(()=>{el.classList.remove('found-anim');el.classList.add('found-ok');},360);}
  });
  const b=document.getElementById('b-'+CSS.escape(word));
  if(b)b.className='word-badge found';
  spawnParticles();
  setInfo(`🎉 "${word}" 발견! +${pts}점`,g.info[word]||'');
  updateStats();
  if(g.found.size===g.words.length)setTimeout(()=>endGame(true),460);
}

function spawnParticles(){
  const cols=['#3b82f6','#10b981','#f59e0b','#e11d6a','#8b5cf6','#f97316'];
  const con=document.getElementById('particles');
  for(let i=0;i<14;i++){
    const p=document.createElement('div');p.className='particle';
    const x=10+Math.random()*80,y=10+Math.random()*80;
    const tx=(Math.random()-.5)*150,ty=(Math.random()-.5)*150,sz=4+Math.random()*5;
    p.style.cssText=`left:${x}%;top:${y}%;width:${sz}px;height:${sz}px;background:${cols[~~(Math.random()*cols.length)]};--tx:${tx}px;--ty:${ty}px;`;
    con.appendChild(p);setTimeout(()=>p.remove(),870);
  }
}

let fwAF=null,fwP=[];
function launchFireworks(infinite){
  const cv=document.getElementById('fwCanvas');
  cv.classList.add('on');cv.width=innerWidth;cv.height=innerHeight;
  const ctx=cv.getContext('2d');fwP=[];
  const maxMs=infinite?Infinity:4000;let lastB=0,startTs=null;
  function burst(){
    const x=.15*cv.width+Math.random()*.7*cv.width,y=.08*cv.height+Math.random()*.55*cv.height;
    const cols=['#ff2d78','#00d4ff','#ffe600','#00ff88','#b44fff','#ff8c00','#fff'];
    const n=infinite?55:40;
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;
      fwP.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:.013+Math.random()*.016,r:2+Math.random()*3,color:cols[~~(Math.random()*cols.length)],gravity:.11});
    }
  }
  function frame(ts){
    if(!startTs)startTs=ts;
    ctx.clearRect(0,0,cv.width,cv.height);
    if(ts-lastB>(infinite?370:320)){burst();if(infinite)burst();lastB=ts;}
    fwP=fwP.filter(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=.97;p.vy*=.97;p.life-=p.decay;
      if(p.life<=0)return false;
      ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=5;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();return true;
    });
    if(ts-startTs<maxMs||fwP.length>0)fwAF=requestAnimationFrame(frame);
    else{ctx.clearRect(0,0,cv.width,cv.height);cv.classList.remove('on');}
  }
  cancelAnimationFrame(fwAF);fwAF=requestAnimationFrame(frame);
  if(infinite){
    cv.style.pointerEvents='auto';
    cv.onclick=()=>{cancelAnimationFrame(fwAF);ctx.clearRect(0,0,cv.width,cv.height);cv.classList.remove('on');cv.style.pointerEvents='none';cv.onclick=null;};
  }
}

// 일반 resize + visualViewport resize(주소창·키보드 변화) 모두 대응
window.addEventListener('resize', () => layout());
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => layout());
  window.visualViewport.addEventListener('scroll', () => layout());
}
prepareReady();
</script>
